name: Publish to PyPI

# 骨架：发布到 PyPI（Trusted Publishing / OIDC，免 token）。
# M0 暂设为【手动触发】——尚未在 PyPI 配置 pending publisher（项目名 jianbing-utils）。
# 配好 PyPI trusted publisher 后，改回 `on: push: tags: ["v*"]` 即可 tag 自动发布。
on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Trusted Publishing 必需
    steps:
      - uses: actions/checkout@v4
      - name: Install uv 0.11.26
        run: curl -LsSf https://astral.sh/uv/0.11.26/install.sh | sh
      - name: Build without sources
        run: uv build --no-sources
      # 冒烟：装一次构建产物，确保可导入
      - name: Smoke import
        run: uv run --with dist/*.whl --no-project python -c "import jianbing_utils; print(jianbing_utils.__version__)"
      - name: Publish (Trusted Publishing)
        run: uv publish
